<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odin-todoList</title>
</head>

<body>
  <aside id="aside">
    <h1 id="head">Projects</h1>
    <div id="projectContainer">
      <ul id="projectList"></ul>
      <button id="newProjectBtn">+ Project</button>
    </div>

    <dialog closedby="closerequest" id="newProjectDialogBox">
      <form method="dialog">
        <h1>New Project</h1>
        <p>
          <label for="newProjectName">Name :</label><input type="text" id="newProjectName" />
        </p>
        <div>
          <label for="desc">Project Description :</label> <br>
          <textarea id="desc" rows="10" style="width: 100%; resize: none;" placeholder="my Awesome Project..."></textarea>
        </div>
        <div class="lower-proj">
          <div class="lower">
            <button type="button" class="cancelBtn">Cancel</button>
            <button type="submit" id="addBtn">Add</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog closedby="closerequest" id="editProjectDialogBox">
      <form method="dialog">
        <h1>Edit Project</h1>
        <p>
          <label for="projectNameEdit">Name :</label><input type="text" id="projectNameEdit" />
        </p>
        <div>
          <label for="descEdit">Project Description :</label> <br>
          <textarea id="descEdit" rows="10" style="width: 100%; resize: none;"></textarea>
        </div>
        <div class="lower-proj">
          <button type="button" class="cancelBtn">Cancel</button>
          <button type="submit" id="editBtn">Edit</button>
        </div>
      </form>
    </dialog>
  </aside>
  <main id="main">

    <button id="addTaskBtn">Add Task</button>

    <dialog closedby="closerequest" id="TodoDialog">
      <form method="dialog">
        <h1>New Task</h1>
        <p>
          <label for="todoName">Name :</label><input type="text" id="todoName" />
        </p>
        <div>
          <label for="todoDesc">Desc :</label> <textarea id="todoDesc" rows="5" style="width: 100%; resize: none;"
            placeholder="Tasking..."></textarea>
        </div>
        <p>
          <label for="todoDate">dueDate :</label><input type="date" id="todoDate">
        </p>
        <div class="priorityDiv"> 
          <p>Priority :</p>
          <div class="priorityRadios">
          <input type="radio" name="Priority" id="prior1" value="Low"><label for="prior1">Low</label>
          <input type="radio" name="Priority" id="prior2" value="Medium"><label for="prior2">Medium</label>
          <input type="radio" name="Priority" id="prior3" value="High"><label for="prior3">High</label>
          </div>
        </div>
        <div class="lower-proj">
          <button type="button" class="cancelBtn">Cancel</button>
          <button type="submit" id="addTodoBtn">Add</button>
        </div>
      </form>
    </dialog>

    <dialog closedby="closerequest" id="TodoEditDialog">
      <form method="dialog">
        <h1>Edit Project</h1>
        <p>
          <label for="title">Name :</label><input type="text" id="todoNameEditInput" />
        </p>
        <div class="lower-proj"><button type="button" class="cancelBtn">Cancel</button>
          <button type="submit" id="todoEditBtn">Edit</button>
        </div>
      </form>
    </dialog>
  </main>
</body>

</html>
